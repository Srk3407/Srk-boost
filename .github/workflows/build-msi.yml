name: Build SRK Boost MSI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Python setup ────────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        architecture: "x64"

    # ── 3. Install dependencies ────────────────────────────────────────────
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-Qt6 PyQt6-sip
        pip install psutil pywin32 wmi speedtest-cli qt-material Pillow
        pip install pyinstaller

    # ── 4. Build EXE with PyInstaller ─────────────────────────────────────
    - name: Build EXE
      run: |
        pyinstaller SrkBoost.spec --clean --noconfirm
      
    - name: Verify EXE exists
      run: |
        if (!(Test-Path "dist\SRK Boost\SRK Boost.exe")) {
          Write-Error "EXE not found!"
          exit 1
        }
        Write-Host "EXE size: $((Get-Item 'dist\SRK Boost\SRK Boost.exe').Length / 1MB) MB"

    # ── 5. Install WiX Toolset ─────────────────────────────────────────────
    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix
        wix extension add WixToolset.UI.wixext
        wix extension add WixToolset.Util.wixext

    # ── 6. Build MSI ───────────────────────────────────────────────────────
    - name: Build MSI
      run: |
        New-Item -ItemType Directory -Force -Path release
        wix build installer\SrkBoost.wxs `
          -ext WixToolset.UI.wixext `
          -ext WixToolset.Util.wixext `
          -o release\SrkBoost-v1.7-Setup.msi
      
    - name: Verify MSI exists
      run: |
        if (!(Test-Path "release\SrkBoost-v1.7-Setup.msi")) {
          Write-Error "MSI not found!"
          exit 1
        }
        Write-Host "MSI size: $((Get-Item 'release\SrkBoost-v1.7-Setup.msi').Length / 1MB) MB"

    # ── 7. Upload as artifact ──────────────────────────────────────────────
    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: SrkBoost-MSI
        path: release\SrkBoost-v1.7-Setup.msi
        retention-days: 30

    # ── 8. Also upload portable ZIP ───────────────────────────────────────
    - name: Upload portable EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: SrkBoost-Portable
        path: dist\SRK Boost\
        retention-days: 30
