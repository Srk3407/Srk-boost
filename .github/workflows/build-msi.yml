name: Build SRK Boost MSI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        architecture: "x64"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-Qt6 PyQt6-sip
        pip install psutil pywin32 wmi speedtest-cli qt-material Pillow
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller SrkBoost.spec --clean --noconfirm
        Write-Host "=== dist contents ==="
        Get-ChildItem -Recurse "dist\SRK Boost" | Select-Object FullName | Head -30

    - name: Verify EXE
      run: |
        $exe = "dist\SRK Boost\SRK Boost.exe"
        if (!(Test-Path $exe)) {
          Write-Host "=== dist folder ==="
          Get-ChildItem -Recurse dist | Select-Object FullName
          Write-Error "EXE not found!"
          exit 1
        }
        Write-Host "EXE OK: $((Get-Item $exe).Length / 1MB) MB"

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix --version 4.0.5
        wix extension add -g WixToolset.UI.wixext/4.0.5
        wix extension add -g WixToolset.Util.wixext/4.0.5

    - name: Build MSI
      run: |
        $distDir = "${{ github.workspace }}\dist\SRK Boost"
        Write-Host "DistDir: $distDir"
        New-Item -ItemType Directory -Force -Path release
        wix build installer\SrkBoost.wxs `
          -ext WixToolset.UI.wixext `
          -ext WixToolset.Util.wixext `
          -d DistDir="$distDir" `
          -o release\SrkBoost-v1.7-Setup.msi

    - name: Verify MSI
      run: |
        if (!(Test-Path "release\SrkBoost-v1.7-Setup.msi")) {
          Write-Error "MSI not found!"
          exit 1
        }
        Write-Host "MSI OK: $((Get-Item 'release\SrkBoost-v1.7-Setup.msi').Length / 1MB) MB"

    - name: Upload MSI
      uses: actions/upload-artifact@v4
      with:
        name: SrkBoost-MSI
        path: release\SrkBoost-v1.7-Setup.msi
        retention-days: 30

    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: SrkBoost-Portable
        path: dist\SRK Boost\
        retention-days: 30
